<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VitalSalu - Tu tienda diaria</title>
  <style>
    body { font-family: sans-serif; background: #f0f0f0; margin: 0; padding: 0; }
    header { background: #0a8754; color: white; padding: 1rem; text-align: center; }
    .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; padding: 1rem; }
    .product { background: white; padding: 1rem; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .product img { width: 100%; height: 200px; object-fit: cover; }
    .price { color: #0a8754; font-weight: bold; }
    .btn { background: #0a8754; color: white; padding: 0.5rem 1rem; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 0.5rem; }
    .btn:hover { background: #066e43; }
  </style>
</head>
<body>
  <header>
    <h1>VitalSalu</h1>
    <p>Productos esenciales para tu día a día</p>
  </header>

  <div class="container">
    <div class="product">
      <img src="https://i.imgur.com/3y0D1KM.jpg" alt="Vitaminas Naturales">
      <h2>Vitaminas Naturales</h2>
      <p class="price">$12.99</p>
      <a class="btn" href="https://wa.me/1234567890?text=Estoy interesado/a en las Vitaminas Naturales">Comprar</a>
    </div>

    <div class="product">
      <img src="https://i.imgur.com/YvS0CwE.jpg" alt="Audífonos Inalámbricos">
      <h2>Audífonos Inalámbricos</h2>
      <p class="price">$19.99</p>
      <a class="btn" href="https://wa.me/1234567890?text=Estoy interesado/a en los Audífonos Inalámbricos">Comprar</a>
    </div>

    <div class="product">
      <img src="https://i.imgur.com/WzJ7xXC.jpg" alt="Crema Hidratante">
      <h2>Crema Hidratante</h2>
      <p class="price">$8.49</p>
      <a class="btn" href="https://wa.me/1234567890?text=Estoy interesado/a en la Crema Hidratante">Comprar</a>
    </div>
  </div>
</body>
</html>
