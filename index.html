<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vital Salu</title>
  <style>
    :root {
      --verde: #2ecc71;
      --claro: #ffffff;
      --fondo: #f4f4f4;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--fondo);
    }
    header {
      background: var(--verde);
      color: var(--claro);
      padding: 1rem;
      text-align: center;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
      padding: 1rem;
    }
    .producto {
      background: white;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
    }
    .producto img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 6px;
    }
    .producto h3 {
      margin: 0.5rem 0;
    }
    .precio {
      color: var(--verde);
      font-weight: bold;
      margin: 0.5rem 0;
    }
    .btn {
      background: var(--verde);
      color: var(--claro);
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 5px;
      text-decoration: none;
      display: inline-block;
      margin-top: 0.5rem;
    }
    .btn:hover {
      background: #27ae60;
    }
  </style>
</head>
<body>

  <header>
    <h1>Vital Salu</h1>
    <p>Salud, belleza, moda y tecnología para tu bienestar</p>
  </header>

  <div class="container">

    <div class="producto">
      <img src="https://i.imgur.com/3y0D1KM.jpg" alt="Vitaminas Naturales">
      <h3>Vitaminas Naturales</h3>
      <p class="precio">$12.99</p>
      <a href="https://wa.me/1234567890?text=Hola, quiero comprar Vitaminas Naturales" class="btn">Comprar</a>
    </div>

    <div class="producto">
      <img src="https://i.imgur.com/WzJ7xXC.jpg" alt="Crema Hidratante Facial">
      <h3>Crema Hidratante Facial</h3>
      <p class="precio">$8.49</p>
      <a href="https://wa.me/1234567890?text=Hola, quiero comprar la Crema Facial" class="btn">Comprar</a>
    </div>

    <div class="producto">
      <img src="https://i.imgur.com/YvS0CwE.jpg" alt="Audífonos Bluetooth">
      <h3>Audífonos Bluetooth</h3>
      <p class="precio">$19.99</p>
      <a href="https://wa.me/1234567890?text=Hola, quiero comprar los Audífonos Bluetooth" class="btn">Comprar</a>
    </div>

    <div class="producto">
      <img src="https://i.imgur.com/xPdvSEN.jpg" alt="Ropa Casual Mujer">
      <h3>Set Moda Casual Mujer</h3>
      <p class="precio">$24.95</p>
      <a href="https://wa.me/1234567890?text=Hola, quiero comprar el Set de Moda" class="btn">Comprar</a>
    </div>

  </div>

</body>
</html>
